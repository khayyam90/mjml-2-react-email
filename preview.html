<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MJML to React Email Preview</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 12px 24px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }

    .panels {
      display: flex;
      flex: 1;
      gap: 0;
      overflow: hidden;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #d0d4db;
    }

    .panel:last-child {
      border-right: none;
    }

    .panel-title {
      background: #ffffff;
      border-bottom: 2px solid #e0e3e8;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      flex-shrink: 0;
    }

    .panel:first-child .panel-title {
      border-bottom-color: #4a90d9;
      color: #2c6fad;
    }

    .panel:last-child .panel-title {
      border-bottom-color: #34a85a;
      color: #1e7a40;
    }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: #fff;
    }
  </style>
</head>
<body>
  <header>MJML &rarr; React Email Converter</header>
  <div class="panels">
    <div class="panel">
      <div class="panel-title">MJML input file</div>
      <iframe src="input.html" title="MJML input file"></iframe>
    </div>
    <div class="panel">
      <div class="panel-title">After conversion in React Email</div>
      <iframe src="output.html" title="After conversion in React Email"></iframe>
    </div>
  </div>
</body>
</html>
